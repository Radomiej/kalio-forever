<svg width="100%" viewBox="0 0 1280 760" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Kalio current HITL confirmation flow</title>
  <desc>Decision-tree view of the confirmation gate for tools with requiresConfirmation, including session-bound confirmation, cancellation, and timeout semantics.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f4ed"/>
      <stop offset="50%" stop-color="#fffdfa"/>
      <stop offset="100%" stop-color="#f1f8f5"/>
    </linearGradient>
    <radialGradient id="glowGold" cx="0" cy="0" r="1">
      <stop offset="0%" stop-color="#f4dfb6" stop-opacity="0.78"/>
      <stop offset="100%" stop-color="#f4dfb6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowMint" cx="1" cy="0" r="1">
      <stop offset="0%" stop-color="#d6f2e7" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#d6f2e7" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M2 1 L8 5 L2 9" fill="none" stroke="#707070" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font: 700 34px Georgia, 'Times New Roman', serif; fill: #1f2937; }
      .subtitle { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #5b6472; }
      .pill { font: 700 12px 'Segoe UI', Arial, sans-serif; letter-spacing: 0.12em; text-transform: uppercase; }
      .cardTitle { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
      .body { font: 500 17px 'Segoe UI', Arial, sans-serif; fill: #4b5563; }
      .label { font: 700 13px 'Segoe UI', Arial, sans-serif; fill: #6b7280; }
    </style>
  </defs>

  <rect width="1280" height="760" fill="url(#bg)"/>
  <circle cx="170" cy="150" r="220" fill="url(#glowGold)"/>
  <circle cx="1120" cy="130" r="240" fill="url(#glowMint)"/>

  <g filter="url(#shadow)">
    <rect x="60" y="44" width="1160" height="126" rx="30" fill="#fffdfa" stroke="#e6dfd1" stroke-width="1.2"/>
  </g>
  <text x="92" y="96" class="title">Human-in-the-Loop Gate</text>
  <text x="92" y="128" class="subtitle">Confirmed tools pause the run, emit a session-bound approval request, and only resume after confirm, cancel, or timeout.</text>
  <rect x="940" y="72" width="220" height="36" rx="18" fill="#f4efe3" stroke="#d8c9af" stroke-width="1"/>
  <text x="1050" y="95" text-anchor="middle" class="pill" fill="#7a5a12">Session-bound approval</text>

  <g filter="url(#shadow)">
    <rect x="90" y="230" width="252" height="120" rx="28" fill="#fff7eb" stroke="#c9861a" stroke-width="1.4"/>
  </g>
  <rect x="118" y="254" width="140" height="30" rx="15" fill="#f6e3c2"/>
  <text x="188" y="274" text-anchor="middle" class="pill" fill="#8d5e10">Step 1</text>
  <text x="118" y="314" class="cardTitle" fill="#70480f">Tool call arrives</text>
  <text x="118" y="346" class="body">Dispatch reads the tool metadata.</text>

  <polygon points="480,222 620,300 480,378 340,300" fill="#fffaf1" stroke="#d59b2b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="294" text-anchor="middle" class="cardTitle" fill="#7a5411">requiresConfirmation?</text>
  <text x="480" y="324" text-anchor="middle" class="body">per-tool decision</text>

  <g filter="url(#shadow)">
    <rect x="90" y="456" width="252" height="120" rx="28" fill="#e9f8f2" stroke="#1f8b69" stroke-width="1.4"/>
  </g>
  <rect x="118" y="480" width="140" height="30" rx="15" fill="#d9f2e7"/>
  <text x="188" y="500" text-anchor="middle" class="pill" fill="#0d7c5d">No gate</text>
  <text x="118" y="540" class="cardTitle" fill="#115644">Execute now</text>
  <text x="118" y="572" class="body">The tool runs immediately and returns a normal ToolResult.</text>

  <g filter="url(#shadow)">
    <rect x="610" y="230" width="300" height="132" rx="28" fill="#e9f8f2" stroke="#1f8b69" stroke-width="1.4"/>
  </g>
  <rect x="638" y="254" width="160" height="30" rx="15" fill="#d9f2e7"/>
  <text x="718" y="274" text-anchor="middle" class="pill" fill="#0d7c5d">Step 2</text>
  <text x="638" y="314" class="cardTitle" fill="#115644">Pause and emit</text>
  <text x="638" y="346" class="body">The event includes requestId and sessionId.</text>

  <g filter="url(#shadow)">
    <rect x="950" y="230" width="240" height="132" rx="28" fill="#f3efff" stroke="#6d5bd0" stroke-width="1.4"/>
  </g>
  <rect x="978" y="254" width="150" height="30" rx="15" fill="#e7ddff"/>
  <text x="1053" y="274" text-anchor="middle" class="pill" fill="#5b44cc">Step 3</text>
  <text x="978" y="314" class="cardTitle" fill="#332b84">User decides</text>
  <text x="978" y="346" class="body">Frontend sends confirm or cancel.</text>

  <polygon points="1053,426 1173,494 1053,562 933,494" fill="#fffaf1" stroke="#d59b2b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1053" y="488" text-anchor="middle" class="cardTitle" fill="#7a5411">confirmed?</text>
  <text x="1053" y="516" text-anchor="middle" class="body">or timeout</text>

  <g filter="url(#shadow)">
    <rect x="830" y="610" width="270" height="98" rx="28" fill="#e9f8f2" stroke="#1f8b69" stroke-width="1.4"/>
  </g>
  <text x="862" y="652" class="cardTitle" fill="#115644">Resume the run</text>
  <text x="862" y="684" class="body">Confirmed calls execute and return tool:result.</text>

  <g filter="url(#shadow)">
    <rect x="1080" y="610" width="140" height="98" rx="28" fill="#f3f1ea" stroke="#6c6a62" stroke-width="1.3"/>
  </g>
  <text x="1150" y="652" text-anchor="middle" class="cardTitle" fill="#4c4a45">Cancel</text>
  <text x="1150" y="684" text-anchor="middle" class="body">Return cancelled result.</text>

  <g filter="url(#shadow)">
    <rect x="520" y="590" width="248" height="118" rx="28" fill="#fff9f1" stroke="#d59b2b" stroke-width="1.3"/>
  </g>
  <rect x="548" y="614" width="148" height="30" rx="15" fill="#f7e7c9"/>
  <text x="622" y="634" text-anchor="middle" class="pill" fill="#936510">Timeout rule</text>
  <text x="548" y="672" class="body">timeoutMs comes from the request.</text>
  <text x="548" y="700" class="body">0 disables the timeout.</text>

  <line x1="342" y1="300" x2="620" y2="300" stroke="#707070" stroke-width="2.3" marker-end="url(#arrow)"/>
  <text x="390" y="280" class="label">yes</text>

  <line x1="480" y1="378" x2="216" y2="454" stroke="#707070" stroke-width="2.3" marker-end="url(#arrow)"/>
  <text x="340" y="408" class="label">no</text>

  <line x1="910" y1="300" x2="948" y2="300" stroke="#707070" stroke-width="2.3" marker-end="url(#arrow)"/>
  <text x="930" y="280" class="label">show dialog</text>

  <line x1="1053" y1="362" x2="1053" y2="424" stroke="#707070" stroke-width="2.3" marker-end="url(#arrow)"/>
  <text x="1071" y="398" class="label">respond</text>

  <line x1="995" y1="550" x2="930" y2="608" stroke="#707070" stroke-width="2.3" marker-end="url(#arrow)"/>
  <text x="948" y="578" class="label">confirm</text>

  <line x1="1116" y1="550" x2="1142" y2="608" stroke="#707070" stroke-width="2.3" marker-end="url(#arrow)"/>
  <text x="1150" y="578" class="label">cancel or timeout</text>
</svg>