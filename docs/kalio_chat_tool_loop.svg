<svg width="100%" viewBox="0 0 1280 760" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Kalio current chat and tool loop</title>
  <desc>Poster-style view of the session-scoped chat loop: prompt send, per-session queueing, streaming, tool dispatch, optional confirmation, and final completion.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f5ef"/>
      <stop offset="52%" stop-color="#fffdfa"/>
      <stop offset="100%" stop-color="#eef8f4"/>
    </linearGradient>
    <radialGradient id="glowPurple" cx="0" cy="0" r="1">
      <stop offset="0%" stop-color="#d9d0ff" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#d9d0ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGreen" cx="1" cy="0" r="1">
      <stop offset="0%" stop-color="#d5f3e7" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#d5f3e7" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M2 1 L8 5 L2 9" fill="none" stroke="#707070" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font: 700 34px Georgia, 'Times New Roman', serif; fill: #1f2937; }
      .subtitle { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #5b6472; }
      .pill { font: 700 12px 'Segoe UI', Arial, sans-serif; letter-spacing: 0.12em; text-transform: uppercase; }
      .cardTitle { font: 700 25px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
      .body { font: 500 17px 'Segoe UI', Arial, sans-serif; fill: #4b5563; }
      .label { font: 700 13px 'Segoe UI', Arial, sans-serif; fill: #6b7280; }
    </style>
  </defs>

  <rect width="1280" height="760" fill="url(#bg)"/>
  <circle cx="150" cy="160" r="220" fill="url(#glowPurple)"/>
  <circle cx="1120" cy="120" r="250" fill="url(#glowGreen)"/>

  <g filter="url(#shadow)">
    <rect x="60" y="44" width="1160" height="126" rx="30" fill="#fffdfa" stroke="#e6dfd1" stroke-width="1.2"/>
  </g>
  <text x="92" y="96" class="title">Chat and Tool Loop</text>
  <text x="92" y="128" class="subtitle">Each turn stays inside one session: prompt in, queue if needed, stream a pass, dispatch tools, and continue until the turn closes.</text>
  <rect x="980" y="72" width="180" height="36" rx="18" fill="#f3ede2" stroke="#d8c9af" stroke-width="1"/>
  <text x="1070" y="95" text-anchor="middle" class="pill" fill="#7a5a12">Current runtime</text>

  <g filter="url(#shadow)">
    <rect x="84" y="230" width="326" height="210" rx="30" fill="#f2eeff" stroke="#6d5bd0" stroke-width="1.5"/>
  </g>
  <rect x="112" y="254" width="124" height="30" rx="15" fill="#e5dcff"/>
  <text x="174" y="274" text-anchor="middle" class="pill" fill="#5b44cc">Frontend</text>
  <text x="112" y="322" class="cardTitle" fill="#332b84">1. Send prompt</text>
  <text x="112" y="360" class="body">ChatInterface emits chat:send.</text>
  <text x="112" y="394" class="body">Payload includes sessionId and message content.</text>

  <g filter="url(#shadow)">
    <rect x="470" y="214" width="726" height="312" rx="34" fill="#e9f8f2" stroke="#1f8b69" stroke-width="1.5"/>
  </g>
  <rect x="500" y="238" width="220" height="30" rx="15" fill="#d9f2e7"/>
  <text x="610" y="258" text-anchor="middle" class="pill" fill="#0d7c5d">Backend orchestration</text>
  <text x="500" y="308" class="cardTitle" fill="#115644">2. Queue by session</text>
  <text x="500" y="342" class="body">Gateway hands the turn to the session queue.</text>
  <text x="500" y="376" class="body">chat:queued only if something is already running.</text>

  <line x1="610" y1="394" x2="610" y2="432" stroke="#6f8d83" stroke-width="2.2" marker-end="url(#arrow)"/>
  <text x="626" y="418" class="label">handoff</text>

  <text x="500" y="474" class="cardTitle" fill="#115644">3. Stream a pass</text>
  <text x="500" y="508" class="body">ChatService streams agent:start, context, and chunks.</text>

  <g filter="url(#shadow)">
    <rect x="866" y="254" width="290" height="220" rx="30" fill="#fff7eb" stroke="#c9861a" stroke-width="1.4"/>
  </g>
  <rect x="894" y="278" width="160" height="30" rx="15" fill="#f6e3c2"/>
  <text x="974" y="298" text-anchor="middle" class="pill" fill="#8d5e10">Tool dispatch</text>
  <text x="894" y="344" class="cardTitle" fill="#70480f">4. Run tool calls</text>
  <text x="894" y="378" class="body">tool:start and tool:result wrap each call.</text>
  <text x="894" y="412" class="body">Confirmed tools pause before execution.</text>

  <path d="M 1020 474 C 980 566, 760 610, 618 556" fill="none" stroke="#8ca197" stroke-width="2.2" stroke-dasharray="8 6" marker-end="url(#arrow)"/>
  <text x="848" y="612" text-anchor="middle" class="label">ToolResult feeds the next LLM pass</text>

  <line x1="410" y1="332" x2="468" y2="332" stroke="#707070" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="440" y="314" text-anchor="middle" class="label">chat:send</text>

  <line x1="864" y1="506" x2="402" y2="578" stroke="#707070" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="672" y="564" text-anchor="middle" class="label">streaming + tool feedback</text>

  <g filter="url(#shadow)">
    <rect x="84" y="494" width="326" height="172" rx="30" fill="#f8f5ff" stroke="#6d5bd0" stroke-width="1.4"/>
  </g>
  <rect x="112" y="518" width="132" height="30" rx="15" fill="#ebe2ff"/>
  <text x="178" y="538" text-anchor="middle" class="pill" fill="#5b44cc">Live UI state</text>
  <text x="112" y="584" class="cardTitle" fill="#332b84">5. Resume or finish</text>
  <text x="112" y="618" class="body">The user can confirm or cancel the pending tool.</text>
  <text x="112" y="652" class="body">chat:complete and agent:done close the turn.</text>

  <line x1="410" y1="612" x2="864" y2="438" stroke="#707070" stroke-width="2.2" marker-end="url(#arrow)"/>
  <text x="638" y="482" text-anchor="middle" class="label">confirm or cancel</text>

  <g filter="url(#shadow)">
    <rect x="470" y="584" width="726" height="92" rx="26" fill="#fffaf3" stroke="#d9ccb3" stroke-width="1.2"/>
  </g>
  <text x="504" y="620" class="cardTitle" fill="#2b2f36">State split on the frontend</text>
  <text x="504" y="654" class="body">sessionStore keeps the transcript. agentStore keeps live chunks and tool activity.</text>
</svg>