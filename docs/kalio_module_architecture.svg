<svg width="700" height="470" viewBox="0 0 700 470" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Kalio module architecture</title>
  <desc>Frontend thin client (purple, left) communicates with NestJS backend modules (green, right) via Socket.IO and @kalio/sdk. Both import shared types from @kalio/types (amber, bottom).</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1 L8 5 L2 9" fill="none" stroke="#777" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ─── Frontend box ──────────────────────────────────────────────────── -->
  <rect x="20" y="20" width="270" height="340" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="155" y="47" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" font-weight="700" fill="#3C3489">Frontend — thin client</text>

  <text x="38" y="70"  font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#534AB7">React 19 · Vite 6 · daisyUI 5</text>
  <text x="38" y="90"  font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#534AB7">Zustand 5 (session · agent · settings)</text>
  <text x="38" y="110" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#534AB7">@kalio/sdk — Socket.IO wrapper</text>
  <text x="38" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#534AB7">Zero business logic on FE</text>

  <line x1="38" y1="146" x2="272" y2="146" stroke="#534AB766" stroke-width="0.75"/>

  <text x="38" y="166" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#534AB7">ChatInterface · CanvasPanel</text>
  <text x="38" y="186" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#534AB7">MessageBubble · ToolCallBubble</text>
  <text x="38" y="206" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#534AB7">HITLDialog — confirmation gate</text>
  <text x="38" y="226" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#534AB7">RAAppRenderer (iframe + GUI DSL)</text>
  <text x="38" y="246" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#534AB7">PersonaPanel · VFSExplorer</text>
  <text x="38" y="266" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#534AB7">MCPPanel · SkillEditorPanel</text>
  <text x="38" y="286" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#534AB7">MemoryPage · ObservabilityPage</text>
  <text x="38" y="306" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#534AB7">ImagePanel · CLIAgentPanel</text>
  <text x="38" y="326" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#534AB7">SettingsPanel · AuditLogViewer</text>
  <text x="38" y="346" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#534AB7">SessionList · CredentialManager</text>

  <!-- ─── Backend box ──────────────────────────────────────────────────── -->
  <rect x="410" y="20" width="270" height="340" rx="12" fill="#E1F5EE" stroke="#0F7055" stroke-width="1"/>
  <text x="545" y="47" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#085041">Backend — NestJS 11</text>

  <text x="428" y="70"  font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#0F7055">ChatModule · AgentLoopModule</text>
  <text x="428" y="90"  font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#0F7055">LLMModule · ToolModule</text>
  <text x="428" y="110" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#0F7055">VFSModule · PersonaModule</text>
  <text x="428" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#0F7055">MCPModule · RAAppModule</text>
  <text x="428" y="150" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#0F7055">MemoryModule · ImageModule</text>
  <text x="428" y="170" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#0F7055">CLIAgentModule · CredentialsModule</text>

  <line x1="428" y1="186" x2="662" y2="186" stroke="#0F705566" stroke-width="0.75"/>

  <text x="428" y="206" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#0F7055">Drizzle ORM + SQLite (better-sqlite3)</text>
  <text x="428" y="226" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#0F7055">sqlite-vec — vector memory (RAG)</text>
  <text x="428" y="246" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#0F7055">@Tool() injectable decorator pattern</text>
  <text x="428" y="266" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#0F7055">Socket.IO gateway per session</text>
  <text x="428" y="286" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#0F7055">VFS: sessions/{id}/files/ isolation</text>
  <text x="428" y="306" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#0F7055">AllowedPathsService (fs_* guard)</text>
  <text x="428" y="326" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#0F7055">AuditLog · Skills · ToolOverrides</text>
  <text x="428" y="346" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#0F7055">MCP watchdog + lifecycle mgmt</text>

  <!-- ─── Socket.IO / @kalio/sdk connector ─────────────────────────────── -->
  <line x1="290" y1="190" x2="330" y2="190" stroke="#777" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="370" y1="190" x2="410" y2="190" stroke="#777" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="330" y="175" width="40" height="30" rx="5" fill="#F5F5F5" stroke="#ccc" stroke-width="0.75"/>
  <text x="350" y="188" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#555">Socket</text>
  <text x="350" y="200" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#555">.IO</text>

  <!-- ─── @kalio/types box ──────────────────────────────────────────────── -->
  <rect x="110" y="385" width="480" height="60" rx="10" fill="#FEF3E2" stroke="#854F0B" stroke-width="1"/>
  <text x="350" y="407" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#63380A">@kalio/types</text>
  <text x="350" y="425" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.5" fill="#854F0B">single source of truth · packages/@kalio/types/src/index.ts</text>
  <text x="350" y="439" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.5" fill="#854F0B">SocketEvents · ChatMessage · MCPServer · GuiDslPayload · AuditLogEntry · CLIAgentConfig</text>

  <!-- ─── Import arrows to @kalio/types ────────────────────────────────── -->
  <line x1="155" y1="360" x2="155" y2="383" stroke="#777" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="545" y1="360" x2="545" y2="383" stroke="#777" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="105" y="375" font-family="system-ui,-apple-system,sans-serif" font-size="9.5" fill="#999">imports</text>
  <text x="550" y="375" font-family="system-ui,-apple-system,sans-serif" font-size="9.5" fill="#999">imports</text>
</svg>
