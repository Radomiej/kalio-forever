name: Backend CI

on:
  push:
    branches:
      - main
      - mvp
    paths:
      - '.github/workflows/backend-ci.yml'
      - 'apps/kalio-api/**'
      - 'packages/@kalio/types/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
  pull_request:
    paths:
      - '.github/workflows/backend-ci.yml'
      - 'apps/kalio-api/**'
      - 'packages/@kalio/types/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Backend typecheck
        run: pnpm --filter kalio-api typecheck

      - name: Backend tests
        run: pnpm --filter kalio-api test
