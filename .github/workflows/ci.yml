name: CI

on:
  push:
    branches:
      - mvp
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm --filter @kalio/types --filter @kalio/sdk build

      - name: Backend typecheck
        run: pnpm --filter kalio-api typecheck

      - name: Backend coverage gate
        run: pnpm --filter kalio-api test:cov

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Frontend typecheck
        run: pnpm --filter kalio-web typecheck

      - name: Frontend coverage gate
        run: pnpm --filter kalio-web test:cov

  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit gate
        run: pnpm audit:report

  e2e:
    runs-on: ubuntu-latest
    env:
      CI: 'true'
      NODE_ENV: test
      TEST_API_URL: http://127.0.0.1:3016/api
      LLM_PROVIDER: mock
      CREDENTIALS_MASTER_KEY: ci-test-master-key-32-chars-minimum
      WORKSPACE_ROOT: /tmp/kalio-ci-workspace
      PORT: 3016
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm --filter @kalio/types --filter @kalio/sdk build

      - name: Build API
        run: pnpm --filter kalio-api build

      - name: Start API server
        run: pnpm --filter kalio-api start &

      - name: Start web dev server
        run: pnpm --filter kalio-web dev &

      - name: Wait for servers
        run: |
          npx wait-on http://127.0.0.1:3016/api/health http://localhost:5188 --timeout 60000

      - name: Install Playwright browsers
        run: pnpm --filter @kalio/e2e exec playwright install --with-deps chromium

      - name: Smoke E2E gate
        run: pnpm --filter @kalio/e2e exec playwright test --project=chromium

  quality-gate:
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
      - audit
      - e2e
    steps:
      - name: Quality gate passed
        run: echo 'All required quality gates passed.'