name: CI

on:
  push:
    branches:
      - mvp
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm --filter @kalio/types --filter @kalio/sdk build

      - name: Run workspace tests
        run: pnpm turbo run test

  backend:
    runs-on: ubuntu-latest
    env:
      CI: 'true'
      DATABASE_PATH: /tmp/kalio-backend-ci.db
      MEMORY_DB_PATH: /tmp/kalio-backend-ci-memory
      WORKSPACE_ROOT: /tmp/kalio-backend-workspace
      CREDENTIALS_MASTER_KEY: ci-test-master-key-32-chars-minimum
      LLM_PROVIDER: mock
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm --filter @kalio/types --filter @kalio/sdk build

      - name: Backend typecheck
        run: pnpm --filter kalio-api typecheck

      - name: Backend coverage gate
        run: pnpm --filter kalio-api test:cov

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Frontend typecheck
        run: pnpm --filter kalio-web typecheck

      - name: Frontend coverage gate
        run: pnpm --filter kalio-web test:cov

  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit gate
        run: pnpm audit:report

  e2e:
    runs-on: ubuntu-latest
    env:
      CI: 'true'
      PLAYWRIGHT_BASE_URL: http://localhost:5288
      PLAYWRIGHT_API_ORIGIN: http://localhost:3316
      TEST_API_URL: http://localhost:3316/api
      LLM_PROVIDER: mock
      CREDENTIALS_MASTER_KEY: ci-test-master-key-32-chars-minimum
      WORKSPACE_ROOT: /tmp/kalio-ci-workspace
      DATABASE_PATH: /tmp/kalio-ci.db
      MEMORY_DB_PATH: /tmp/kalio-ci-memory
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm --filter @kalio/types --filter @kalio/sdk build

      - name: Install Playwright browsers
        run: pnpm --filter @kalio/e2e exec playwright install --with-deps chromium

      - name: Smoke E2E gate
        run: pnpm --filter @kalio/e2e exec playwright test --project=chromium

  quality-gate:
    runs-on: ubuntu-latest
    needs:
      - tests
      - backend
      - frontend
      - audit
      - e2e
    steps:
      - name: Quality gate passed
        run: echo 'All required quality gates passed.'
