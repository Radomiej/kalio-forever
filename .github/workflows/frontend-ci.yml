name: Frontend CI

on:
  push:
    branches:
      - main
      - mvp
    paths:
      - '.github/workflows/frontend-ci.yml'
      - 'apps/kalio-web/**'
      - 'packages/@kalio/types/**'
      - 'packages/@kalio/sdk/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
  pull_request:
    paths:
      - '.github/workflows/frontend-ci.yml'
      - 'apps/kalio-web/**'
      - 'packages/@kalio/types/**'
      - 'packages/@kalio/sdk/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Frontend typecheck
        run: pnpm --filter kalio-web typecheck

      - name: Frontend tests
        run: pnpm --filter kalio-web test
