name: E2E

on:
  push:
    branches:
      - main
      - mvp
    paths:
      - '.github/workflows/e2e.yml'
      - 'apps/e2e/**'
      - 'apps/kalio-api/**'
      - 'apps/kalio-web/**'
      - 'packages/@kalio/types/**'
      - 'packages/@kalio/sdk/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
  pull_request:
    paths:
      - '.github/workflows/e2e.yml'
      - 'apps/e2e/**'
      - 'apps/kalio-api/**'
      - 'apps/kalio-web/**'
      - 'packages/@kalio/types/**'
      - 'packages/@kalio/sdk/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      CI: 'true'
      NODE_ENV: test
      TEST_API_URL: http://127.0.0.1:3016/api
      LLM_PROVIDER: mock
      CREDENTIALS_MASTER_KEY: ci-test-master-key-32-chars-minimum

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @kalio/e2e exec playwright install --with-deps chromium

      - name: Run smoke E2E suite
        run: pnpm --filter @kalio/e2e test:e2e -- --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/e2e/playwright-report/
            apps/e2e/test-results/
          if-no-files-found: ignore
