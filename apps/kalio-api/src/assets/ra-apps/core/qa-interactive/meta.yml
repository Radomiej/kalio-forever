id: qa-interactive
name: Interactive Q&A
version: "1.1.0"
description: Presents a question with clickable answer options. User selects an answer which is sent back to the conversation.
author: kalio-core
input_schema:
  type: object
  properties:
    question:
      type: string
      description: The question to display to the user
    options:
      type: array
      description: List of answer options for the user to choose from
    allow_custom:
      type: boolean
      description: Whether to show a custom answer input
    selected_answer:
      type: string
      description: The selected or custom answer
  required:
    - question
    - options
output_type: gui
tags:
  - qa
  - interactive
  - survey
ui:
  render_as: gui
expose_as_tool: true
tool_description: Interactive Q&A with predefined options and custom answer support
execution:
  timeout_ms: 10000
  requires_user_approval: false
  is_deterministic: true
  render_as: gui