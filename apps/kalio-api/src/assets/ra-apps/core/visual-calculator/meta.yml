id: visual-calculator
name: Visual Calculator
version: "1.0"
description: Visual calculator with GUI DSL rendering — add, subtract, multiply, divide
author: kalio-core
input_schema:
  type: object
  required: [a, b, operation]
  properties:
    a:
      type: number
      description: First number
    b:
      type: number
      description: Second number
    operation:
      type: string
      description: Operation to perform
      enum: [add, subtract, multiply, divide]
output_type: object
expose_as_tool: true
tool_description: Visual calculator — pass { a, b, operation } where operation is add, subtract, multiply, or divide; returns a GUI rendering of the result.
execution:
  timeout_ms: 3000
  requires_user_approval: false